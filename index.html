<!DOCTYPE html>
<html>
<head>
  <title>Jump Game</title>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <script defer  src="game.js"></script>
</head>

<body>

<h2>Press SPACE to Jump</h2>
<h3 id="score">Score: 0</h3>

    <button onclick="location.reload()">Restart</button>
  </div>
</div>

</body>
</html>
